<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    min-height: 100vh;
    background: #0f1624;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.12) 0%, transparent 50%);
    color: #e2e8f0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .back { position: absolute; top: 20px; left: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
  .back:hover { color: #22d3ee; }
  .title {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    text-align: center;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #22d3ee, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .container { max-width: 700px; width: 100%; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .option {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 12px;
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 3vw, 20px);
    font-weight: 600;
    transition: all 0.2s;
  }
  .option:hover { transform: translateY(-3px); border-color: #a78bfa; }
  .option.a:hover { box-shadow: 0 8px 25px rgba(34, 211, 238, 0.25); }
  .option.b:hover { box-shadow: 0 8px 25px rgba(236, 72, 153, 0.25); }
  .or {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    letter-spacing: 4px;
    margin: 8px 0;
  }
  button {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:hover { transform: translateY(-2px); }
  .counter { text-align: center; margin-top: 20px; font-size: 12px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
  @media (max-width: 500px) { .options { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<a href="index.html" class="back">← Back to dashboard</a>
<h1 class="title">Would You Rather?</h1>
<div class="container">
  <div class="options">
    <div class="option a" id="opt-a">Press the button to start</div>
    <div class="option b" id="opt-b">Press the button to start</div>
  </div>
  <div class="or">— OR —</div>
  <button onclick="newQuestion()">New Question</button>
  <div class="counter">Questions played: <span id="counter" style="color: #22d3ee; font-weight: 700;">0</span></div>
</div>
<script>
  const questions = [
    ["have a pet dragon", "have a pet unicorn"],
    ["be able to fly", "be invisible"],
    ["live in a treehouse", "live in an underwater castle"],
    ["have rainbow hair forever", "have sparkly skin forever"],
    ["eat only pizza for a year", "eat only ice cream for a year"],
    ["talk to animals", "speak every human language"],
    ["be super strong", "be super fast"],
    ["have a robot best friend", "have a talking cat best friend"],
    ["visit Mars for a week", "visit the bottom of the ocean for a week"],
    ["never have to sleep", "never have to eat"],
    ["have hands instead of feet", "have feet instead of hands"],
    ["be the best at every sport", "be the best at every game"],
    ["time travel to the past", "time travel to the future"],
    ["have permanent hiccups", "always have a song stuck in your head"],
    ["live in a world made of Lego", "live in a world made of Minecraft blocks"],
    ["have a magic carpet", "have a jetpack"],
    ["be the size of a mouse", "be as tall as a giraffe"],
    ["only whisper for a week", "only shout for a week"],
    ["have ice cream for breakfast every day", "have pizza for breakfast every day"],
    ["win £100 now", "win £1000 next year"],
    ["be in your favourite movie", "be in your favourite video game"],
    ["have a swimming pool of jelly", "have a trampoline made of marshmallows"],
    ["fight 100 duck-sized horses", "fight one horse-sized duck"],
    ["always be 20 minutes late", "always be 3 hours early"],
    ["have glow-in-the-dark skin", "have night-vision eyes"],
    ["be best friends with a famous person", "become famous yourself"],
    ["have a room full of puppies", "have a room full of kittens"],
    ["live without pizza", "live without chocolate"],
    ["know every language in the world", "know how to play every instrument"],
    ["have a pet T-rex", "have a pet woolly mammoth"]
  ];
  let count = 0;
  function newQuestion() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("opt-a").textContent = q[0];
    document.getElementById("opt-b").textContent = q[1];
    count++;
    document.getElementById("counter").textContent = count;
  }
</script>
</body>
</html>
