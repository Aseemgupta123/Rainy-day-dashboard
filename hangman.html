<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    min-height: 100vh;
    background: #0f1624;
    background-image: radial-gradient(circle at 20% 30%, rgba(99,102,241,0.15) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(236,72,153,0.12) 0%, transparent 50%);
    color: #e2e8f0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .back { position: absolute; top: 20px; left: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
  .back:hover { color: #22d3ee; }
  .screen { width: 100%; display: flex; flex-direction: column; align-items: center; }
  .page-title {
    font-size: clamp(28px, 5vw, 42px); font-weight: 800; text-align: center;
    margin-top: 30px; margin-bottom: 8px;
    background: linear-gradient(135deg, #f59e0b, #ec4899, #a78bfa);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-sub { color: #64748b; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; text-align: center; }

  /* Figure Selection */
  .figure-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; max-width: 520px; width: 100%; }
  @media (min-width: 540px) { .figure-grid { grid-template-columns: repeat(4, 1fr); } }
  .figure-card {
    background: rgba(30,41,59,0.6); border: 2px solid rgba(148,163,184,0.15);
    border-radius: 14px; padding: 20px 12px; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .figure-card:hover { border-color: rgba(245,158,11,0.4); transform: translateY(-3px); }
  .figure-card.active { border-color: #f59e0b; background: rgba(245,158,11,0.08); }
  .fig-emoji { font-size: 36px; display: block; margin-bottom: 8px; }
  .fig-name { font-size: 14px; font-weight: 600; color: #f1f5f9; }

  /* Setup Screen */
  .section-label {
    font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 12px; margin-top: 20px;
    align-self: flex-start; max-width: 600px; width: 100%;
  }
  .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 600px; width: 100%; }
  @media (min-width: 520px) { .cat-grid { grid-template-columns: repeat(4, 1fr); } }
  .cat-card {
    background: rgba(30,41,59,0.6); border: 1px solid rgba(148,163,184,0.15);
    border-radius: 12px; padding: 14px 10px; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .cat-card:hover { border-color: rgba(167,139,250,0.4); }
  .cat-card.active { border-color: #a78bfa; background: rgba(167,139,250,0.1); }
  .cat-emoji { font-size: 24px; display: block; margin-bottom: 6px; }
  .cat-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
  .diff-row { display: flex; gap: 10px; max-width: 600px; width: 100%; }
  .diff-btn {
    flex: 1; font-family: inherit; font-size: 14px; font-weight: 600; padding: 12px;
    border: 1px solid rgba(148,163,184,0.2); border-radius: 10px; cursor: pointer;
    background: rgba(30,41,59,0.6); color: #94a3b8; transition: all 0.2s;
  }
  .diff-btn:hover { border-color: rgba(167,139,250,0.4); color: #e2e8f0; }
  .diff-btn.active { border-color: #a78bfa; background: rgba(167,139,250,0.15); color: #c4b5fd; }
  .btn-start {
    font-family: inherit; font-size: 16px; font-weight: 600; padding: 14px 40px;
    border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #ec4899);
    color: white; cursor: pointer; margin-top: 20px; transition: all 0.2s; max-width: 600px; width: 100%;
  }
  .btn-start:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }
  .btn-start:disabled { opacity: 0.35; cursor: default; }
  .nav-back { align-self: flex-start; max-width: 620px; width: 100%; margin-bottom: 4px; }
  .nav-back button {
    font-family: inherit; font-size: 13px; color: #64748b; background: none;
    border: none; cursor: pointer; padding: 0; transition: color 0.2s;
  }
  .nav-back button:hover { color: #a78bfa; }

  /* Game Screen */
  .game-layout {
    display: flex; flex-direction: column; align-items: center;
    gap: 20px; max-width: 720px; width: 100%;
  }
  @media (min-width: 620px) { .game-layout { flex-direction: row; align-items: flex-start; } }
  .figure-area {
    background: rgba(30,41,59,0.5); border: 1px solid rgba(148,163,184,0.15);
    border-radius: 14px; padding: 12px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  #game-svg { display: block; }
  .wrong-count { font-size: 12px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; }
  .wrong-count span { color: #f87171; font-weight: 700; }
  .word-area { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  .game-meta { font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
  #word-display { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 4px 0; }
  .letter-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .letter-char {
    font-size: clamp(22px, 4vw, 30px); font-weight: 800; color: #22d3ee;
    min-width: 26px; text-align: center; min-height: 36px; line-height: 1;
  }
  .letter-line { width: 26px; height: 2px; background: rgba(148,163,184,0.35); border-radius: 1px; }
  .wrong-letters-display { font-size: 14px; color: #f87171; text-align: center; min-height: 20px; letter-spacing: 3px; font-weight: 600; }
  .wrong-letters-label { font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; text-align: center; margin-bottom: 4px; }
  .letter-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; max-width: 310px; }
  .lg-letter {
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; border-radius: 5px;
    border: 1px solid rgba(148,163,184,0.1); color: #475569;
    background: rgba(30,41,59,0.4); user-select: none; transition: all 0.15s;
  }
  .lg-letter.correct { background: rgba(34,211,238,0.15); border-color: #22d3ee; color: #22d3ee; }
  .lg-letter.wrong { background: rgba(248,113,113,0.1); border-color: #f87171; color: #f87171; text-decoration: line-through; }
  .game-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-secondary {
    font-family: inherit; font-size: 14px; font-weight: 600; padding: 10px 20px;
    border: 1px solid rgba(148,163,184,0.2); border-radius: 10px;
    background: transparent; color: #94a3b8; cursor: pointer; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: rgba(167,139,250,0.4); color: #a78bfa; }

  /* Result Screen */
  .result-box { text-align: center; max-width: 440px; width: 100%; }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .result-title.win { color: #22d3ee; }
  .result-title.lose { color: #f87171; }
  .result-word { font-size: 15px; color: #94a3b8; margin-bottom: 28px; line-height: 1.6; }
  .result-word strong { color: #f1f5f9; font-size: 22px; letter-spacing: 5px; display: block; margin-top: 6px; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn-primary {
    font-family: inherit; font-size: 16px; font-weight: 600; padding: 14px 28px;
    border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #ec4899);
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
</style>
</head>
<body>

<a href="index.html" class="back">← Back to dashboard</a>

<!-- Screen 1: Figure Selection -->
<div id="screen-figure" class="screen">
  <h1 class="page-title">Hangman</h1>
  <p class="page-sub">Pick your figure</p>
  <div class="figure-grid">
    <div class="figure-card" onclick="selectFigure('classic')" data-fig="classic">
      <span class="fig-emoji">🪢</span><div class="fig-name">Classic</div>
    </div>
    <div class="figure-card" onclick="selectFigure('snowman')" data-fig="snowman">
      <span class="fig-emoji">⛄</span><div class="fig-name">Snowman</div>
    </div>
    <div class="figure-card" onclick="selectFigure('rocket')" data-fig="rocket">
      <span class="fig-emoji">🚀</span><div class="fig-name">Rocket</div>
    </div>
    <div class="figure-card" onclick="selectFigure('monster')" data-fig="monster">
      <span class="fig-emoji">👹</span><div class="fig-name">Monster</div>
    </div>
  </div>
</div>

<!-- Screen 2: Category + Difficulty -->
<div id="screen-setup" class="screen" style="display:none">
  <h1 class="page-title">Hangman</h1>
  <div class="nav-back"><button onclick="show('screen-figure')">← Change figure</button></div>
  <p class="section-label">Choose a category</p>
  <div class="cat-grid">
    <div class="cat-card" onclick="pickCat('Animals')" data-cat="Animals"><span class="cat-emoji">🐘</span><div class="cat-name">Animals</div></div>
    <div class="cat-card" onclick="pickCat('Food')" data-cat="Food"><span class="cat-emoji">🍕</span><div class="cat-name">Food</div></div>
    <div class="cat-card" onclick="pickCat('Countries')" data-cat="Countries"><span class="cat-emoji">🌍</span><div class="cat-name">Countries</div></div>
    <div class="cat-card" onclick="pickCat('Sports')" data-cat="Sports"><span class="cat-emoji">⚽</span><div class="cat-name">Sports</div></div>
    <div class="cat-card" onclick="pickCat('Disney')" data-cat="Disney"><span class="cat-emoji">✨</span><div class="cat-name">Disney</div></div>
    <div class="cat-card" onclick="pickCat('Nature')" data-cat="Nature"><span class="cat-emoji">🌿</span><div class="cat-name">Nature</div></div>
    <div class="cat-card" onclick="pickCat('Science')" data-cat="Science"><span class="cat-emoji">🔬</span><div class="cat-name">Science</div></div>
    <div class="cat-card" onclick="pickCat('Objects')" data-cat="Objects"><span class="cat-emoji">🏠</span><div class="cat-name">Objects</div></div>
  </div>
  <p class="section-label">Choose difficulty</p>
  <div class="diff-row">
    <button class="diff-btn" onclick="pickDiff('easy')" data-diff="easy">🟢 Easy</button>
    <button class="diff-btn" onclick="pickDiff('medium')" data-diff="medium">🟡 Medium</button>
    <button class="diff-btn" onclick="pickDiff('hard')" data-diff="hard">🔴 Hard</button>
  </div>
  <button class="btn-start" id="start-btn" onclick="startGame()" disabled>Start Game →</button>
</div>

<!-- Screen 3: Game -->
<div id="screen-game" class="screen" style="display:none">
  <h1 class="page-title">Hangman</h1>
  <div class="game-layout">
    <div class="figure-area">
      <svg id="game-svg" viewBox="0 0 200 260" width="200" height="260"></svg>
      <div class="wrong-count">Wrong: <span id="wrong-num">0</span> / 6</div>
    </div>
    <div class="word-area">
      <div class="game-meta" id="game-meta"></div>
      <div id="word-display"></div>
      <div>
        <div class="wrong-letters-label">Wrong guesses</div>
        <div class="wrong-letters-display" id="wrong-letters">—</div>
      </div>
      <div class="letter-grid" id="letter-grid"></div>
    </div>
  </div>
  <div class="game-actions">
    <button class="btn-secondary" onclick="startGame()">New Word</button>
    <button class="btn-secondary" onclick="show('screen-setup')">Change Settings</button>
  </div>
</div>

<!-- Screen 4: Result -->
<div id="screen-result" class="screen" style="display:none">
  <h1 class="page-title">Hangman</h1>
  <div class="result-box">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-word" id="result-word"></div>
    <div class="result-actions">
      <button class="btn-primary" onclick="startGame()">Play Again</button>
      <button class="btn-secondary" onclick="show('screen-setup')">Change Settings</button>
    </div>
  </div>
</div>

let selectedFigure = null;
let selectedCat = null;
let selectedDiff = null;
let currentWord = '';
let guessed = new Set();
let wrongCount = 0;
let gameActive = false;

function show(screenId) {
  ['screen-figure','screen-setup','screen-game','screen-result'].forEach(id => {
    document.getElementById(id).style.display = id === screenId ? 'flex' : 'none';
  });
  gameActive = screenId === 'screen-game';
  if (screenId === 'screen-setup') checkReady();
}

function selectFigure(fig) {
  selectedFigure = fig;
  document.querySelectorAll('.figure-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-fig="${fig}"]`).classList.add('active');
  setTimeout(() => show('screen-setup'), 180);
}

function pickCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-cat="${cat}"]`).classList.add('active');
  checkReady();
}

function pickDiff(diff) {
  selectedDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-diff="${diff}"]`).classList.add('active');
  checkReady();
}

function checkReady() {
  document.getElementById('start-btn').disabled = !(selectedCat && selectedDiff);
}

function startGame() {
  if (!selectedFigure || !selectedCat || !selectedDiff) return;
  const pool = words[selectedCat][selectedDiff];
  currentWord = pool[Math.floor(Math.random() * pool.length)];
  guessed = new Set();
  wrongCount = 0;

  const fig = figures[selectedFigure];
  const svg = document.getElementById('game-svg');
  svg.innerHTML = fig.bg;

  document.getElementById('game-meta').textContent = `${selectedCat} · ${selectedDiff}`;
  document.getElementById('wrong-num').textContent = '0';
  document.getElementById('wrong-letters').textContent = '—';

  updateWordDisplay();
  buildLetterGrid();
  show('screen-game');
}

function guess(letter) {
  if (!gameActive || guessed.has(letter)) return;
  guessed.add(letter);

  if (currentWord.includes(letter)) {
    updateWordDisplay();
    if ([...currentWord].every(l => guessed.has(l))) {
      gameActive = false;
      setTimeout(win, 350);
    }
  } else {
    wrongCount++;
    document.getElementById('wrong-num').textContent = wrongCount;
    document.getElementById('game-svg').insertAdjacentHTML('beforeend', figures[selectedFigure].parts[wrongCount - 1]);
    updateWrongLetters();
    if (wrongCount >= 6) {
      gameActive = false;
      setTimeout(lose, 400);
    }
  }
  updateLetterGrid();
}

function updateWordDisplay() {
  document.getElementById('word-display').innerHTML = [...currentWord].map(l => `
    <div class="letter-slot">
      <div class="letter-char">${guessed.has(l) ? l : '&nbsp;'}</div>
      <div class="letter-line"></div>
    </div>`).join('');
}

function updateWrongLetters() {
  const wrong = [...guessed].filter(l => !currentWord.includes(l));
  document.getElementById('wrong-letters').textContent = wrong.length ? wrong.join('  ') : '—';
}

function buildLetterGrid() {
  document.getElementById('letter-grid').innerHTML =
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l =>
      `<div class="lg-letter" id="lg-${l}">${l}</div>`).join('');
}

function updateLetterGrid() {
  guessed.forEach(l => {
    const el = document.getElementById(`lg-${l}`);
    if (el) el.classList.add(currentWord.includes(l) ? 'correct' : 'wrong');
  });
}

function win() {
  document.getElementById('result-emoji').textContent = '🎉';
  document.getElementById('result-title').className = 'result-title win';
  document.getElementById('result-title').textContent = 'You got it!';
  document.getElementById('result-word').innerHTML = `The word was<strong>${currentWord}</strong>`;
  show('screen-result');
}

function lose() {
  document.getElementById('result-emoji').textContent = '😬';
  document.getElementById('result-title').className = 'result-title lose';
  document.getElementById('result-title').textContent = 'So close!';
  document.getElementById('result-word').innerHTML = `The word was<strong>${currentWord}</strong>`;
  show('screen-result');
}

document.addEventListener('keydown', e => {
  if (gameActive && /^[a-zA-Z]$/.test(e.key)) guess(e.key.toUpperCase());
});
</script>
</body>
</html>
