<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Starter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    min-height: 100vh;
    background: #0f1624;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.12) 0%, transparent 50%);
    color: #e2e8f0;
    padding: 20px;
  }
  .back { position: absolute; top: 20px; left: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
  .back:hover { color: #22d3ee; }
  .wrap { max-width: 600px; margin: 30px auto 0; }
  .title {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #22d3ee, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #64748b; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .opening {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(236, 72, 153, 0.1));
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 12px;
    padding: 30px 24px;
    font-size: clamp(16px, 3vw, 20px);
    line-height: 1.6;
    font-style: italic;
    min-height: 130px;
    display: flex;
    align-items: center;
    margin-bottom: 16px;
  }
  .pieces {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .piece {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
  }
  .piece-label { font-size: 10px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .piece-value { font-size: clamp(11px, 2vw, 13px); font-weight: 600; }
  button {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:hover { transform: translateY(-2px); }
  .tip {
    margin-top: 20px;
    text-align: center;
    color: #64748b;
    font-size: 13px;
    line-height: 1.5;
  }
  @media (max-width: 500px) { .pieces { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<a href="index.html" class="back">← Back to dashboard</a>
<div class="wrap">
  <h1 class="title">Story Starter</h1>
  <p class="subtitle">Your opening line awaits</p>
  <div class="opening" id="opening">Press the button for a story opening...</div>
  <div class="pieces">
    <div class="piece">
      <div class="piece-label">Hero</div>
      <div class="piece-value" id="p-hero">—</div>
    </div>
    <div class="piece">
      <div class="piece-label">Setting</div>
      <div class="piece-value" id="p-setting">—</div>
    </div>
    <div class="piece">
      <div class="piece-label">Twist</div>
      <div class="piece-value" id="p-twist">—</div>
    </div>
  </div>
  <button onclick="generate()">New Story Opening</button>
  <p class="tip">Grab a pen and paper. What happens next is up to you!</p>
</div>
<script>
  const heroes = [
    "a detective who's afraid of the dark",
    "a 10-year-old inventor",
    "a retired spy",
    "a talking dog",
    "the last dragon on Earth",
    "a kid with a secret superpower",
    "a robot that wants to be human",
    "a ghost who keeps losing their keys",
    "a pirate who can't swim",
    "a wizard's clumsy apprentice",
    "an astronaut who lost their spaceship",
    "twin sisters with opposite powers",
    "a librarian who guards magical books"
  ];
  const settings = [
    "on a train that never stops",
    "inside an abandoned theme park",
    "on a floating island in the clouds",
    "in a city where it's always night",
    "at a school for monsters",
    "deep inside a volcano",
    "on a mysterious desert island",
    "in a haunted hotel",
    "at the bottom of the sea",
    "in a forest that rearranges itself",
    "on a tiny planet no one has visited",
    "inside a giant clock tower",
    "in a shop that only opens at midnight"
  ];
  const twists = [
    "but something wasn't what it seemed",
    "when a mysterious letter arrived",
    "and heard a strange noise from above",
    "just as the lights went out",
    "when a stranger handed them a box",
    "but they weren't alone",
    "and the ground began to shake",
    "when time suddenly stopped",
    "but the door wouldn't open",
    "and discovered a hidden passage",
    "when they realised they were invisible",
    "as a shadow moved behind them",
    "but none of it was real"
  ];

  function generate() {
    const hero = heroes[Math.floor(Math.random() * heroes.length)];
    const setting = settings[Math.floor(Math.random() * settings.length)];
    const twist = twists[Math.floor(Math.random() * twists.length)];
    const sentence = `One day, ${hero} was ${setting} ${twist}...`;
    document.getElementById("opening").textContent = `"${sentence}"`;
    document.getElementById("p-hero").textContent = hero;
    document.getElementById("p-setting").textContent = setting;
    document.getElementById("p-twist").textContent = twist;
  }
</script>
</body>
</html>
