<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;

    background-image:

    color: #e2e8f0;
    padding: 20px;
  }
  .back { position: absolute; top: 20px; left: 20px; color: #64748b; text-decoration: none; font-size: 14px; }
  .back:hover { color: #22d3ee; }
  .wrap { max-width: 600px; margin: 30px auto 0; }
  .title {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #22d3ee, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #64748b; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .card {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .category {
    font-size: 11px;
    color: #22d3ee;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .question {
    font-size: clamp(18px, 3vw, 22px);
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 20px;
  }
  .answers { display: grid; gap: 10px; }
  .answer {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    color: #e2e8f0;
    text-align: left;
    transition: all 0.2s;
  }
  .answer:hover:not(:disabled) { border-color: #a78bfa; background: rgba(167, 139, 250, 0.1); }
  .answer.correct { background: rgba(34, 211, 238, 0.2); border-color: #22d3ee; color: #22d3ee; }
  .answer.wrong { background: rgba(236, 72, 153, 0.2); border-color: #ec4899; color: #f472b6; }
  .answer:disabled { cursor: default; }
  button.next {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 16px;
  }
  button.next:hover { transform: translateY(-2px); }
  .score {
    text-align: center;
    color: #64748b;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .score-num { color: #22d3ee; font-weight: 700; font-size: 14px; }
</style>
</head>

    { cat: "Random", q: "What is the capital of Brazil?", a: ["Rio de Janeiro", "São Paulo", "Brasília", "Salvador"], correct: 2 },
    { cat: "Random", q: "How many sides does a pentagon have?", a: ["4", "5", "6", "7"], correct: 1 },
    { cat: "Random", q: "What is the most popular sport in the world?", a: ["Basketball", "Tennis", "Football (Soccer)", "Cricket"], correct: 2 },
    { cat: "Random", q: "What do you call a baby sheep?", a: ["Cub", "Kitten", "Lamb", "Foal"], correct: 2 },
    { cat: "Random", q: "How many days are in a leap year?", a: ["364", "365", "366", "367"], correct: 2 }
  ];

  let pool = [];
  let current = null;
  let score = 0;
  let answered = 0;

  function nextQuestion() {
    if (pool.length === 0) pool = [...questions].sort(() => Math.random() - 0.5);
    current = pool.pop();
    document.getElementById("category").textContent = current.cat;
    document.getElementById("question").textContent = current.q;
    const answersEl = document.getElementById("answers");
    answersEl.innerHTML = current.a.map((ans, i) =>
      `<button class="answer" onclick="pick(${i})">${ans}</button>`
    ).join("");
    document.querySelector("button.next").textContent = "Next question";
  }

  function pick(i) {
    const btns = document.querySelectorAll(".answer");
    btns.forEach((b, idx) => {
      b.disabled = true;
      if (idx === current.correct) b.classList.add("correct");
      else if (idx === i) b.classList.add("wrong");
    });
    if (i === current.correct) score++;
    answered++;
    document.getElementById("score").textContent = `${score} / ${answered}`;
  }
</script>
</body>
</html>
